name: Test & Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Python linting & static analysis
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort

      - name: Run Black (code formatter check)
        run: black --check backend/ --quiet
        continue-on-error: true

      - name: Run isort (import sorting check)
        run: isort --check-only backend/
        continue-on-error: true

      - name: Lint with flake8
        run: |
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Lint with pylint
        run: pylint backend/ --exit-zero --max-line-length=127
        continue-on-error: true

  # API tests
  api-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Run API tests
        run: |
          python -m pytest --version || true
          python -c "
          import json
          from fastapi.testclient import TestClient
          from backend.main import app

          client = TestClient(app)

          # Test valid projection
          payload = {
              'current_net_worth': 50000,
              'annual_income': 80000,
              'monthly_investment': 1000,
              'annual_return_rate': 0.08,
              'annual_income_growth': 0.03,
              'annual_expenses': 48000,
              'years': 5
          }
          response = client.post('/api/project', json=payload)
          assert response.status_code == 200
          data = response.json()
          assert 'scenarios' in data
          assert 'conservative' in data['scenarios']
          assert 'moderate' in data['scenarios']
          assert 'optimistic' in data['scenarios']
          print('✓ Valid projection test passed')

          # Test edge case: zero investment
          payload['monthly_investment'] = 0
          response = client.post('/api/project', json=payload)
          assert response.status_code == 200
          print('✓ Zero investment test passed')

          # Test edge case: expenses > income
          payload['annual_expenses'] = 100000
          response = client.post('/api/project', json=payload)
          assert response.status_code == 200
          print('✓ Negative savings rate test passed')

          print('✓ All API tests passed')
          "

  # Dependency audit
  deps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety pip-audit

      - name: Check with Safety
        run: pip install -r backend/requirements.txt && safety check --json
        continue-on-error: true

      - name: Check with pip-audit
        run: pip-audit --desc
        continue-on-error: true

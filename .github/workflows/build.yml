name: Build & Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # Run all checks before building
  pre-build-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate project structure
        run: |
          echo "Checking required files..."
          [ -f "Dockerfile" ] && echo "✓ Dockerfile" || (echo "✗ Dockerfile missing" && exit 1)
          [ -f "docker-compose.yml" ] && echo "✓ docker-compose.yml" || (echo "✗ docker-compose.yml missing" && exit 1)
          [ -f "backend/main.py" ] && echo "✓ backend/main.py" || (echo "✗ backend/main.py missing" && exit 1)
          [ -f "backend/requirements.txt" ] && echo "✓ backend/requirements.txt" || (echo "✗ backend/requirements.txt missing" && exit 1)
          [ -f "frontend/index.html" ] && echo "✓ frontend/index.html" || (echo "✗ frontend/index.html missing" && exit 1)
          [ -f "README.md" ] && echo "✓ README.md" || (echo "✗ README.md missing" && exit 1)

  # Build Docker image
  build:
    needs: pre-build-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Generate SBOM (Software Bill of Materials)
  sbom:
    needs: pre-build-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: backend/
          format: cyclonedx
          output: sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom.json
